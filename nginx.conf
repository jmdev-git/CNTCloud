worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Increase body size for file uploads
    client_max_body_size 50M;

    # Upstream: Next.js app on port 1101
    upstream nextjs_app {
        server 127.0.0.1:1101;
    }

    # Redirect all HTTP to HTTPS
    server {
        listen 80;
        server_name 192.168.50.100;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name 192.168.50.100;

        # Self-signed certificate paths
        ssl_certificate     C:/nginx/ssl/cert.pem;
        ssl_certificate_key C:/nginx/ssl/key.pem;

        # Modern SSL settings
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Strict-Transport-Security "max-age=31536000" always;

        # Pass real client info to Next.js
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket support (Next.js HMR + any WS features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Proxy timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Static Next.js assets — cache aggressively
        location /_next/static/ {
            proxy_pass http://nextjs_app;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Next.js image optimization
        location /_next/image {
            proxy_pass http://nextjs_app;
        }

        # API routes — no caching
        location /api/ {
            proxy_pass http://nextjs_app;
            proxy_buffering off;
        }

        # Everything else
        location / {
            proxy_pass http://nextjs_app;
        }
    }
}
